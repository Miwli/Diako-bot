# تمپلیت نمونه‌های ریسلر — از ایمیج‌های آماده‌ی نصب اصلی استفاده می‌کنه، بدون build
# اجرا:  docker compose -p diako-<slug> -f این‌فایل --project-directory instances/<slug> up -d

services:

  bot:
    image: diako-bot:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./shared-data:/shared-data
    depends_on:
      - panel

  panel:
    image: diako-panel:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:${PANEL_PORT:-8000}:8000"
    volumes:
      - ./shared-data:/shared-data
      - static_data:/app/staticfiles

volumes:
  static_data:
