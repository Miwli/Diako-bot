{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}دیاکو{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tabler Icons (local) -->
  <link rel="stylesheet" href="{% static 'diako/css/tabler-icons.min.css' %}">

  <!-- Diako CSS -->
  <link rel="stylesheet" href="{% static 'diako/css/themes.css' %}">
  <link rel="stylesheet" href="{% static 'diako/css/layout.css' %}">
  <link rel="stylesheet" href="{% static 'diako/css/animations.css' %}">

  {% block extra_head %}{% endblock %}
</head>
<body>

{% block body %}{% endblock %}

<!-- Notification Stack -->
<div id="notif-stack" class="notif-stack"></div>

<script src="{% static 'diako/js/app.js' %}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
