{% extends 'diako/base.html' %}
{% load static %}

{% block title %}ادیتور متن‌ها — دیاکو{% endblock %}

{% block extra_head %}
<style>
.dash-body    { height: 100vh; min-height: unset; overflow: hidden; }
.dash-container { flex: 1; min-height: 0; overflow: hidden; padding: 0 !important; }

/* ── Two-Column Layout ─────────────────────────── */
.te-wrap {
  display: flex;
  gap: 14px;
  flex: 1;
  min-height: 0;
}

/* ── Left Sidebar ──────────────────────────────── */
.te-sidebar {
  width: 200px;
  flex-shrink: 0;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 10px 8px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.te-group-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text-main);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  text-align: right;
  transition: background .15s;
  width: 100%;
}
.te-group-btn:hover { background: var(--hover-bg); }
.te-group-btn.active {
  background: var(--accent);
  color: #fff;
}
.te-group-btn .count {
  font-size: 10px;
  background: rgba(0,0,0,.12);
  border-radius: 20px;
  padding: 1px 7px;
  flex-shrink: 0;
}
.te-group-btn.active .count { background: rgba(255,255,255,.25); }

/* ── Main Panel ────────────────────────────────── */
.te-main {
  flex: 1;
  min-width: 0;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.te-main-header {
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--card-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-shrink: 0;
}
.te-main-header h2 {
  font-size: 14px;
  font-weight: 600;
  margin: 0;
}
.te-search {
  background: var(--input-bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 12px;
  color: var(--text-main);
  font-family: inherit;
  width: 200px;
  outline: none;
}
.te-search:focus { border-color: var(--accent); }

.te-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── Text Item ─────────────────────────────────── */
.te-item {
  background: var(--bg-main);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: border-color .15s;
}
.te-item:focus-within { border-color: var(--accent); }
.te-item.dirty { border-color: var(--warning, #f59e0b); }

.te-item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.te-key {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--card-border);
  padding: 1px 6px;
  border-radius: 4px;
  user-select: all;
}
.te-vars {
  font-size: 10px;
  color: var(--accent);
  opacity: .8;
}

.te-textarea {
  background: var(--input-bg, var(--card-bg));
  border: 1px solid var(--card-border);
  border-radius: 7px;
  padding: 7px 9px;
  font-size: 13px;
  font-family: 'Vazirmatn', inherit;
  color: var(--text-main);
  resize: vertical;
  min-height: 38px;
  width: 100%;
  box-sizing: border-box;
  line-height: 1.6;
  outline: none;
  direction: auto;
  transition: border-color .15s;
}
.te-textarea:focus { border-color: var(--accent); }
.te-textarea.has-html { font-family: 'Courier New', monospace; font-size: 11px; direction: ltr; }

.te-item-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.te-save-btn {
  padding: 4px 14px;
  border-radius: 7px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  opacity: 0;
  transition: opacity .15s, background .15s;
}
.te-item.dirty .te-save-btn { opacity: 1; }
.te-save-btn:hover { filter: brightness(1.1); }
.te-save-btn:disabled { opacity: .5; cursor: default; }

.te-status {
  font-size: 11px;
  color: var(--text-muted);
  min-width: 60px;
  text-align: left;
}
.te-status.ok   { color: var(--success, #22c55e); }
.te-status.err  { color: var(--danger, #ef4444); }
</style>
{% endblock %}

        <div class="te-main">
          <div class="te-main-header">
            <h2 id="te-group-title">انتخاب گروه</h2>
            <input class="te-search" id="te-search" placeholder="جستجو در کلید یا متن..." oninput="filterItems()">
          </div>
          <div class="te-list" id="te-list">
            <div style="color:var(--text-muted);font-size:13px;margin:auto;text-align:center;">
              یک گروه را از سمت راست انتخاب کنید.
            </div>
          </div>
        </div>

      </div>

<script>
const GROUPS = {{ groups_json|safe }};
const GROUP_NAMES = Object.keys(GROUPS);
let currentGroup = null;

// ── Extract variable placeholders from a text ──
function extractVars(text) {
  const matches = [...text.matchAll(/\{([^}]+)\}/g)];
  const unique = [...new Set(matches.map(m => m[1]))];
  return unique;
}

// ── Build sidebar ──
function buildSidebar() {
  const sb = document.getElementById('te-sidebar');
  sb.innerHTML = '';
  GROUP_NAMES.forEach(name => {
    const items = GROUPS[name];
    const btn = document.createElement('button');
    btn.className = 'te-group-btn';
    btn.dataset.group = name;
    btn.innerHTML = `<span>${name}</span><span class="count">${items.length}</span>`;
    btn.onclick = () => selectGroup(name);
    sb.appendChild(btn);
  });
}

// ── Select a group ──
function selectGroup(name) {
  currentGroup = name;
  document.querySelectorAll('.te-group-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.group === name);
  });
  document.getElementById('te-group-title').textContent = name;
  document.getElementById('te-search').value = '';
  renderItems(GROUPS[name]);
}

// ── Render items for a group ──
function renderItems(items) {
  const list = document.getElementById('te-list');
  list.innerHTML = '';
  if (!items || !items.length) {
    list.innerHTML = '<div style="color:var(--text-muted);font-size:13px;margin:auto;">خالی</div>';
    return;
  }
  items.forEach(t => {
    list.appendChild(buildItem(t.key, t.value));
  });
}

// ── Build a single item ──
function buildItem(key, value) {
  const div = document.createElement('div');
  div.className = 'te-item';
  div.dataset.key = key;

  const vars = extractVars(value);
  const varHtml = vars.length
    ? `<span class="te-vars">متغیر: ${vars.map(v=>`{${v}}`).join(' ')}</span>`
    : '';

  const isHtml = /<[a-z]/.test(value);
  const rows = Math.max(2, Math.min(8, value.split('\n').length + (value.length > 100 ? 2 : 0)));

  div.innerHTML = `
    <div class="te-item-header">
      <span class="te-key">${key}</span>
      ${varHtml}
    </div>
    <textarea class="te-textarea${isHtml ? ' has-html' : ''}" rows="${rows}">${escHtml(value)}</textarea>
    <div class="te-item-footer">
      <button class="te-save-btn" onclick="saveItem(this)">ذخیره</button>
      <span class="te-status"></span>
    </div>
  `;

  const ta = div.querySelector('textarea');
  ta.addEventListener('input', () => {
    div.classList.add('dirty');
    div.querySelector('.te-status').textContent = '';
    div.querySelector('.te-status').className = 'te-status';
  });
  return div;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Save a single item ──
async function saveItem(btn) {
  const item = btn.closest('.te-item');
  const key = item.dataset.key;
  const value = item.querySelector('textarea').value;
  const status = item.querySelector('.te-status');

  btn.disabled = true;
  status.textContent = '...';
  status.className = 'te-status';

  try {
    const resp = await fetch('/diako/api/update-text/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCsrf()},
      body: JSON.stringify({key, value}),
    });
    const data = await resp.json();
    if (data.ok) {
      item.classList.remove('dirty');
      status.textContent = '✓ ذخیره شد';
      status.className = 'te-status ok';
      // Update local data
      const group = GROUPS[currentGroup];
      const idx = group.findIndex(t => t.key === key);
      if (idx !== -1) group[idx].value = value;
      showNotif('✓ ذخیره شد', 'success');
    } else {
      status.textContent = '✗ خطا';
      status.className = 'te-status err';
    }
  } catch(e) {
    status.textContent = '✗ خطا';
    status.className = 'te-status err';
  } finally {
    btn.disabled = false;
  }
}

// ── Filter by search ──
function filterItems() {
  const q = document.getElementById('te-search').value.toLowerCase().trim();
  if (!currentGroup) return;
  const items = q
    ? GROUPS[currentGroup].filter(t =>
        t.key.toLowerCase().includes(q) || t.value.toLowerCase().includes(q)
      )
    : GROUPS[currentGroup];
  renderItems(items);
}

// ── CSRF helper ──
function getCsrf() {
  const c = document.cookie.split(';').find(c => c.trim().startsWith('csrftoken='));
  return c ? c.trim().slice('csrftoken='.length) : '';
}

// ── Notification helper (reuses app.js showNotif if available) ──
function showNotif(msg, type) {
  if (typeof window.showNotif === 'function') {
    window.showNotif(msg, type);
  }
}

// ── Init ──
buildSidebar();
if (GROUP_NAMES.length) selectGroup(GROUP_NAMES[0]);
</script>
{% endblock %}
